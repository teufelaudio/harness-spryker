{{ if .Values.services.bitwarden.enabled }}
apiVersion: v1
data:
  token: {{ .Values.bitwarden.token | quote }}
kind: Secret
metadata:
  name: {{ $.Values.resourcePrefix }}bitwarden-auth-token
  labels:
    {{- include "chart.labels" $ | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
type: Opaque
{{ end }}